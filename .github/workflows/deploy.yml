name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to VPS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_SSH_HOST }}
        username: ${{ secrets.VPS_SSH_USER }}
        key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        script: |
          set -e
          cd /home/hajar-admin/htdocs/admin.hajar.com.br/

          # Pull latest code (includes deploy.sh)
          git pull origin main

          # Create backend .env file
          echo "${{ secrets.DOTENV_BACKEND }}" > back/.env

          # Create frontend .env file
          echo "${{ secrets.DOTENV_FRONTEND }}" > front/.env.production

          # Make deploy script executable and run it
          chmod +x ./deploy.sh
          ./deploy.sh
